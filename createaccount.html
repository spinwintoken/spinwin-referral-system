<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Create Account - SpinWinToken</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    .container { max-width: 400px; margin: 0 auto; }
    label { display: block; margin-top: 10px; }
    input { width: 100%; padding: 8px; margin-top: 4px; }
    button { margin-top: 15px; padding: 10px; width: 100%; }
    .message { margin-top: 10px; font-size: 0.9rem; }
    .error { color: #b00020; }
    .success { color: #006400; }
    .link { margin-top: 15px; text-align: center; }
  </style>
</head>

<body>
  <div class="container">
    <h1>Create Account</h1>

    <form id="createAccountForm">
      <label for="email">Email</label>
      <input type="email" id="email" required />

      <label for="password">Password</label>
      <input type="password" id="password" required minlength="6" />

      <label for="confirmPassword">Confirm Password</label>
      <input type="password" id="confirmPassword" required minlength="6" />

      <!-- ⭐ Referral code moved INSIDE the form -->
      <div id="refInfo" class="message" style="font-weight:bold;"></div>

      <button type="submit">Create Account</button>
    </form>

    <div class="link">
      Already have an account? <a href="signin.html">Sign In</a>
    </div>

    <div id="status" class="message"></div>
  </div>

  <script>
    const supabaseUrl = "https://fchwxnontbfybypezpge.supabase.co";
    const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZjaHd4bm9udGJmeWJ5cGV6cGdlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1NDAxNTAsImV4cCI6MjA5NjExNjE1MH0.PTs0fUP0aX21t6RtXyVD__yohn1lFynhgplXhbfZeEI";

    // ⭐ FIXED: use window.supabase to avoid JS crash
    const client = window.supabase.createClient(supabaseUrl, supabaseKey);

    const form = document.getElementById("createAccountForm");
    const statusEl = document.getElementById("status");
    const refInfoEl = document.getElementById("refInfo");

    // ⭐ Referral ALWAYS shows (inside form)
    const urlParams = new URLSearchParams(window.location.search);
    let ref = urlParams.get("ref") || "SPINROOT";
    refInfoEl.textContent = "Referral: " + ref;

    function generateReferralCode() {
      return "SW" + Date.now().toString(36).toUpperCase();
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      statusEl.textContent = "";
      statusEl.className = "message";

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const confirmPassword = document.getElementById("confirmPassword").value;

      if (password !== confirmPassword) {
        statusEl.textContent = "Passwords do not match.";
        statusEl.classList.add("error");
        return;
      }

      try {
        // 1) Supabase signup
        const { data, error } = await client.auth.signUp({
          email,
          password,
          options: {
            emailRedirectTo: "https://spinwintoken.com/registerconfirm.html"
          }
        });

        if (error) {
          statusEl.textContent = "Signup error: " + error.message;
          statusEl.classList.add("error");
          return;
        }

        const user = data.user;
        if (!user) {
          statusEl.textContent = "Signup succeeded, but user object missing.";
          statusEl.classList.add("error");
          return;
        }

        const uid = user.id;
        const referralCode = generateReferralCode();
        const now = new Date().toISOString();

        // 2) Insert into usersql
        const { error: insertError } = await client
          .from("usersql")
          .insert({
            uid,
            email,
            joindate: now,
            referralcode: referralCode,
            referred_by: ref,
            indicator: 1,
            teammembers: 0,
            teamtoken: 0,
            teamtokenpurchased: 0,
            teamtokenavailabe: 0,
            maxtoken: 0,
            auth: 1
          });

        if (insertError) {
          statusEl.textContent =
            "Account created, but profile insert failed: " + insertError.message;
          statusEl.classList.add("error");
          return;
        }

        statusEl.textContent =
          "Account created. Please check your email to confirm.";
        statusEl.classList.add("success");
        form.reset();
      } catch (err) {
        statusEl.textContent = "Unexpected error: " + err.message;
        statusEl.classList.add("error");
      }
    });
  </script>
</body>
</html>
