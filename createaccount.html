<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Create Account</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    font-family: Arial, sans-serif;
    background: #f5f5f5;
    padding: 40px;
}
.container {
    max-width: 400px;
    margin: auto;
    background: white;
    padding: 25px;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}
input {
    width: 100%;
    padding: 12px;
    margin-top: 8px;
    margin-bottom: 15px;
    border: 1px solid #ccc;
    border-radius: 6px;
}
button {
    width: 100%;
    padding: 12px;
    background: black;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}
button:hover {
    opacity: 0.8;
}
.link {
    margin-top: 15px;
    text-align: center;
}
#referralText {
    margin-top: 15px;
    font-weight: bold;
}
</style>

<script src="https://www.google.com/recaptcha/enterprise.js?render=YOUR_RECAPTCHA_KEY"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>
<body>

<div class="container">
    <h2>Create Account</h2>

    <label>Email</label>
    <input type="email" id="email" placeholder="Enter email">

    <label>Password</label>
    <input type="password" id="password" placeholder="Enter password">

    <label>Confirm Password</label>
    <input type="password" id="confirmPassword" placeholder="Confirm password">

    <button onclick="createAccount()">Create Account</button>

    <div class="link">
        Already have an account? <a href="signin.html">Sign In</a>
    </div>

    <p id="referralText"></p>
</div>

<script>
const supabase = supabase.createClient(
    "YOUR_SUPABASE_URL",
    "YOUR_SUPABASE_ANON_KEY"
);

// Ensure referral code ALWAYS appears
window.onload = function () {
    const urlParams = new URLSearchParams(window.location.search);
    const ref = urlParams.get("ref") || "SPINROOT";
    document.getElementById("referralText").innerText = "Referral: " + ref;
};

async function createAccount() {
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();
    const confirmPassword = document.getElementById("confirmPassword").value.trim();

    if (!email || !password || !confirmPassword) {
        alert("All fields are required");
        return;
    }

    if (password !== confirmPassword) {
        alert("Passwords do not match");
        return;
    }

    // reCAPTCHA Enterprise
    const token = await grecaptcha.enterprise.execute("YOUR_RECAPTCHA_KEY", { action: "signup" });

    // Supabase signup
    const { data, error } = await supabase.auth.signUp({
        email: email,
        password: password,
        options: {
            emailRedirectTo: "https://spinwin-referral-system.vercel.app/registerconfirm.html"
        }
    });

    if (error) {
        alert(error.message);
        return;
    }

    // Insert into usersql
    const urlParams = new URLSearchParams(window.location.search);
    const ref = urlParams.get("ref") || "SPINROOT";

    await supabase.from("usersql").insert({
        email: email,
        referralcode: ref,
        indicator: 1
    });

    alert("Check your email to confirm your account");
}
</script>

</body>
</html>
