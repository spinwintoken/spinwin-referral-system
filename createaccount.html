<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Create Account - SpinWinToken</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Supabase -->
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

  <!-- reCAPTCHA v3 -->
  <script src="https://www.google.com/recaptcha/api.js?render=6Le0ew8tAAAAAMLEY9q16CLm6CsO8OqvBr88csI4"></script>

  <style>
    body { font-family: Arial; background:#000; color:#ffd700; padding:40px; margin:0; }
    .container { max-width:420px; margin:auto; background:#111; padding:30px; border-radius:12px; border:1px solid #ffd700; }
    h1 { text-align:center; margin-bottom:25px; color:#ffd700; }
    label { display:block; margin-top:12px; font-weight:bold; }
    input { width:100%; padding:10px; margin-top:6px; background:#222; border:1px solid #ffd700; border-radius:6px; color:#ffd700; }
    button { margin-top:20px; padding:12px; width:100%; background:#ffd700; color:#000; font-weight:bold; border:none; border-radius:6px; cursor:pointer; }

    .message { margin-top:20px; font-size:1.6rem; font-weight:bold; text-align:center; }
    .error { color:#ff4d4d; }
    .success { color:#00ff88; }

    .link { margin-top:18px; text-align:center; }
    .link a { color:#00aaff; text-decoration:none; font-weight:bold; }
  </style>
</head>

<body>
  <div class="container">
    <h1>Create Account</h1>

    <form id="createAccountForm">
      <input type="hidden" id="recaptchaToken">

      <label>Email</label>
      <input type="email" id="email" required />

      <label>Password</label>
      <input type="password" id="password" required minlength="6" />

      <label>Confirm Password</label>
      <input type="password" id="confirmPassword" required minlength="6" />

      <div id="refInfo" class="message" style="font-size:1rem; font-weight:normal;"></div>

      <button type="submit">Create Account</button>
    </form>

    <div class="link">
      Already have an account? <a href="signin.html">Sign In</a>
    </div>

    <div id="status" class="message"></div>
  </div>

  <!-- Load external JS (CSP‑safe) -->
  <script src="/js/createaccount.js"></script>
</body>
</html>
