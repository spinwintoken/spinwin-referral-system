<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SpinWinToken</title>
<script>
// 1. Detect Supabase confirmation link
if (window.location.hash.includes("access_token")) {
    // Send user to registerconfirm.html WITH the token
    window.location.href = "registerconfirm.html" + window.location.hash;
} else {
    // 2. Normal referral flow
    const urlParams = new URLSearchParams(window.location.search);
    const ref = urlParams.get("ref");

    if (ref) {
        window.location.href = "createaccount.html?ref=" + encodeURIComponent(ref);
    } else {
        window.location.href = "createaccount.html?ref=SPINROOT";
    }
}
</script>
</head>
<body></body>
</html>
