<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Account Confirmed</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      background: #000;
      color: #ffd700;
      font-family: Arial, sans-serif;
      text-align: center;
      padding-top: 60px;
      margin: 0;
    }
    .box {
      background: #111;
      padding: 40px;
      border-radius: 12px;
      width: 90%;
      max-width: 480px;
      margin: auto;
      border: 1px solid #ffd700;
    }
    p {
      font-size: 16px;
      color: #fff;
      margin: 8px 0;
    }
    .out {
      color: #00ffea;
      font-size: 14px;
      margin-top: 10px;
    }
  </style>
</head>

<body>
  <div class="box">
    <h1>Account Confirmed</h1>
    <p id="msg">Finalizing your account...</p>

    <p id="emailDisplay" class="out"></p>
    <p id="refDisplay" class="out"></p>
    <p id="matchedRefDisplay" class="out"></p>
    <p id="maxTeamDisplay" class="out"></p>
    <p id="newTeamDisplay" class="out"></p>
  </div>

  <!-- MUST BE ABOVE YOUR SCRIPT -->
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

  <script>
    const supabaseUrl = "https://fchwxnontbfybypezpge.supabase.co";
    const supabaseKey = "YOUR_ANON_KEY_HERE";  // ← replace with your real key

    const client = window.supabase.createClient(supabaseUrl, supabaseKey);

    async function finalizeAccount() {
      const msg = document.getElementById("msg");

      // 1️⃣ Load session
      const { data: { session } } = await client.auth.getSession();
      if (!session) {
        msg.textContent = "No session found.";
        return;
      }

      const email = session.user.email;
      document.getElementById("emailDisplay").textContent = "Email: " + email;

      // 2️⃣ Clean URL
      history.replaceState(null, "", "registerconfirm.html");

      // 3️⃣ Load user row
      const { data: userRow } = await client
        .from("UsersSQL")
        .select("*")
        .eq("email", email)
        .single();

      if (!userRow) {
        msg.textContent = "User not found.";
        return;
      }

      const referrerCode = userRow.referred_by;
      document.getElementById("refDisplay").textContent =
        "Referred By: " + referrerCode;

      // 4️⃣ Set indicator = 2
      await client
        .from("UsersSQL")
        .update({ indicator: 2 })
        .eq("email", email);

      // 5️⃣ Get highest teammembers
      const { data: maxAgg } = await client
        .from("UsersSQL")
        .select("max_teammembers=max(teammembers)")
        .eq("referred_by", referrerCode)
        .single();

      document.getElementById("matchedRefDisplay").textContent =
        "Matched Referred By in UsersSQL: " + referrerCode;

      // ⭐ FIXED NULL HANDLING
      let maxTeam = 0;
      if (maxAgg && maxAgg.max_teammembers !== null) {
        maxTeam = Number(maxAgg.max_teammembers);
      }

      document.getElementById("maxTeamDisplay").textContent =
        "Highest teammembers for " + referrerCode + ": " + maxTeam;

      // 6️⃣ New value = max + 1
      const newTeamCount = maxTeam + 1;

      document.getElementById("newTeamDisplay").textContent =
        "New teammembers value (max+1): " + newTeamCount;

      // 7️⃣ Update DB
      await client
        .from("UsersSQL")
        .update({ teammembers: newTeamCount })
        .eq("email", email);

      msg.textContent = "Your email has been verified successfully!";
    }

    finalizeAccount();
  </script>
</body>
</html>
