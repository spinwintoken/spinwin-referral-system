<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Email Confirmed - SpinWinToken</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #000;
      color: #ffd700;
      padding: 40px;
      margin: 0;
    }
    .container {
      max-width: 420px;
      margin: 0 auto;
      background: #111;
      padding: 30px;
      border-radius: 12px;
      border: 1px solid #ffd700;
      text-align: center;
    }
    h1 { color: #ffd700; }
    .message { margin-top: 15px; }
    .success { color: #00ff88; font-weight: bold; }
    .error { color: #ff4d4d; font-weight: bold; }
  </style>
</head>

<body>
  <div class="container">
    <h1>Email Confirmed</h1>
    <div id="status" class="message">Finalizing your account...</div>
  </div>

  <script>
    const supabaseUrl = "https://fchwxnontbfybypezpge.supabase.co";
    const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZjaHd4bm9udGJmeWJ5cGV6cGdlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1NDAxNTAsImV4cCI6MjA5NjExNjE1MH0.PTs0fUP0aX21t6RtXyVD__yohn1lFynhgplXhbfZeEI";

    const client = window.supabase.createClient(supabaseUrl, supabaseKey);
    const statusEl = document.getElementById("status");

    function parseFragment() {
      const hash = window.location.hash.substring(1);
      const params = new URLSearchParams(hash);
      return {
        access_token: params.get("access_token"),
        refresh_token: params.get("refresh_token")
      };
    }

    async function finalizeAccount() {
      try {
        const tokens = parseFragment();

        if (!tokens.access_token) {
          statusEl.innerHTML = `
            Your email is confirmed.<br><br>
            <span class="success">Please sign in to continue.</span><br><br>
            <a href="signin.html">Go to Sign In</a>
          `;
          return;
        }

        // ⭐ Use access_token directly to get the user
        const { data: userData, error: userErr } = await client.auth.getUser(tokens.access_token);

        if (userErr || !userData?.user) {
          statusEl.textContent = "Unable to load confirmed user. Please try signing in.";
          statusEl.classList.add("error");
          return;
        }

        const uid = userData.user.id;

        // ⭐ Load referral info
        const { data: userRow, error: rowErr } = await client
          .from("UsersSQL")
          .select("referred_by")
          .eq("uid", uid)
          .single();

        if (rowErr) {
          statusEl.textContent = "Error loading your account.";
          statusEl.classList.add("error");
          return;
        }

        const referrer = userRow?.referred_by;

        // ⭐ Update indicator = 2
        await client
          .from("UsersSQL")
          .update({ indicator: 2 })
          .eq("uid", uid);

        // ⭐ Increment referrer teammembers
        if (referrer && referrer !== "SPINROOT") {
          await client.rpc("increment_teammembers", {
            ref_code: referrer
          });
        }

        statusEl.textContent = "Your account is fully activated!";
        statusEl.classList.add("success");

      } catch (err) {
        statusEl.textContent = "Unexpected error: " + err.message;
        statusEl.classList.add("error");
      }
    }

    finalizeAccount();
  </script>
</body>
</html>
