<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Account Confirmed</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      background: #000;
      color: #ffd700;
      font-family: Arial, sans-serif;
      text-align: center;
      padding-top: 60px;
      margin: 0;
    }
    .box {
      background: #111;
      padding: 40px;
      border-radius: 12px;
      width: 90%;
      max-width: 480px;
      margin: auto;
      border: 1px solid #ffd700;
    }
    p {
      font-size: 16px;
      color: #fff;
      margin: 8px 0;
    }
    .out {
      margin-top: 12px;
      color: #00ffea;
      font-size: 14px;
    }
  </style>
</head>

<body>
  <div class="box">
    <h1>Account Confirmed</h1>
    <p id="msg">Finalizing your account...</p>

    <p id="emailDisplay" class="out"></p>
    <p id="refDisplay" class="out"></p>
    <p id="rowsCountDisplay" class="out"></p>
    <p id="allTeamDisplay" class="out"></p>
    <p id="maxTeamDisplay" class="out"></p>
    <p id="newTeamDisplay" class="out"></p>
  </div>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

  <script>
    const supabaseUrl = "https://fchwxnontbfybypezpge.supabase.co";
    const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZjaHd4bm9udGJmeWJ5cGV6cGdlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1NDAxNTAsImV4cCI6MjA5NjExNjE1MH0.PTs0fUP0aX21t6RtXyVD__yohn1lFynhgplXhbfZeEI";

    const client = window.supabase.createClient(supabaseUrl, supabaseKey);

    async function finalizeAccount() {
      const msg = document.getElementById("msg");

      // 1️⃣ Load session
      const { data: { session } } = await client.auth.getSession();
      if (!session) {
        msg.textContent = "Unable to load your session. Please sign in.";
        return;
      }

      const email = session.user.email;
      document.getElementById("emailDisplay").textContent = "Email: " + email;

      // 2️⃣ Load this user's row
      const { data: userRow } = await client
        .from("UsersSQL")
        .select("*")
        .eq("email", email)
        .single();

      if (!userRow) {
        msg.textContent = "User record not found in UsersSQL.";
        return;
      }

      const referrerCode = userRow.referred_by;
      document.getElementById("refDisplay").textContent =
        "Referred By: " + referrerCode;

      // 3️⃣ Read ALL rows for this referred_by
      const { data: refRows } = await client
        .from("UsersSQL")
        .select("teammembers")
        .eq("referred_by", referrerCode)
        .order("teammembers", { ascending: true });

      // Count rows
      const rowsCount = refRows.length;
      document.getElementById("rowsCountDisplay").textContent =
        "Rows in UsersSQL for " + referrerCode + ": " + rowsCount;

      // Extract numeric teammembers values
      const teamValues = refRows
        .map(r => Number(r.teammembers))
        .filter(v => !Number.isNaN(v));

      // If no rows exist → treat highest as 0
      if (teamValues.length === 0) {
        document.getElementById("allTeamDisplay").textContent =
          referrerCode + " group has teammembers: (none)";
        document.getElementById("maxTeamDisplay").textContent =
          "Highest teammembers for " + referrerCode + ": 0";

        const newTeamCount = 1;
        document.getElementById("newTeamDisplay").textContent =
          "New teammembers value (max+1): " + newTeamCount;

        await client
          .from("UsersSQL")
          .update({ teammembers: newTeamCount })
          .eq("email", email);

        msg.textContent = "Your email has been verified successfully!";
        return;
      }

      // Show list of teammembers
      document.getElementById("allTeamDisplay").textContent =
        referrerCode + " group has teammembers: " + teamValues.join(", ");

      // Highest value
      const maxTeam = Math.max(...teamValues);
      document.getElementById("maxTeamDisplay").textContent =
        "Highest teammembers for " + referrerCode + ": " + maxTeam;

      // 4️⃣ New value = highest + 1
      const newTeamCount = maxTeam + 1;
      document.getElementById("newTeamDisplay").textContent =
        "New teammembers value (max+1): " + newTeamCount;

      // 5️⃣ Update this user's teammembers
      await client
        .from("UsersSQL")
        .update({ teammembers: newTeamCount })
        .eq("email", email);

      msg.textContent = "Your email has been verified successfully!";
    }

    finalizeAccount();
  </script>
</body>
</html>
