<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>UsersSQL Debug</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      background: #000;
      color: #ffd700;
      font-family: Arial, sans-serif;
      padding: 40px;
    }
    h1 {
      color: #ffd700;
    }
    pre {
      background: #111;
      color: #00ffea;
      padding: 20px;
      border-radius: 10px;
      white-space: pre-wrap;
      font-size: 14px;
    }
    p {
      font-size: 18px;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>
  <h1>UsersSQL — All Rows</h1>

  <p id="rowsCount"></p>
  <pre id="rowsOutput"></pre>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

  <script>
    const supabaseUrl = "https://fchwxnontbfybypezpge.supabase.co";
    const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZjaHd4bm9udGJmeWJ5cGV6cGdlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1NDAxNTAsImV4cCI6MjA5NjExNjE1MH0.PTs0fUP0aX21t6RtXyVD__yohn1lFynhgplXhbfZeEI";

    const client = window.supabase.createClient(supabaseUrl, supabaseKey);

    async function loadAllRows() {
      // Read ALL rows from UsersSQL
      const { data, error } = await client
        .from("UsersSQL")
        .select("*")
        .order("email", { ascending: true });

      if (error) {
        document.getElementById("rowsOutput").textContent =
          "Error reading UsersSQL: " + error.message;
        return;
      }

      // Display row count
      document.getElementById("rowsCount").textContent =
        "Total rows in UsersSQL: " + data.length;

      // Display all rows as JSON
      document.getElementById("rowsOutput").textContent =
        JSON.stringify(data, null, 2);
    }

    loadAllRows();
  </script>
</body>
</html>
