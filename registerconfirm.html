<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Account Confirmed</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      background: #000;
      color: #ffd700;
      font-family: Arial, sans-serif;
      text-align: center;
      padding-top: 60px;
      margin: 0;
    }
    .box {
      background: #111;
      padding: 40px;
      border-radius: 12px;
      width: 90%;
      max-width: 480px;
      margin: auto;
      border: 1px solid #ffd700;
    }
    h1 {
      color: #ffd700;
      margin-bottom: 16px;
    }
    p {
      font-size: 16px;
      color: #fff;
      margin: 8px 0;
    }
    #emailDisplay,
    #refDisplay,
    #matchedRefDisplay,
    #maxTeamDisplay {
      margin-top: 12px;
      color: #00ffea;
      font-size: 14px;
    }
  </style>
</head>

<body>
  <div class="box">
    <h1>Account Confirmed</h1>
    <p id="msg">Finalizing your account...</p>

    <p id="emailDisplay"></p>
    <p id="refDisplay"></p>
    <p id="matchedRefDisplay"></p>
    <p id="maxTeamDisplay"></p>
  </div>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

  <script>
    const supabaseUrl = "https://fchwxnontbfybypezpge.supabase.co";
    const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZjaHd4bm9udGJmeWJ5cGV6cGdlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1NDAxNTAsImV4cCI6MjA5NjExNjE1MH0.PTs0fUP0aX21t6RtXyVD__yohn1lFynhgplXhbfZeEI";

    const client = window.supabase.createClient(supabaseUrl, supabaseKey);

    async function finalizeAccount() {
      const msg = document.getElementById("msg");
      const emailDisplay = document.getElementById("emailDisplay");
      const refDisplay = document.getElementById("refDisplay");
      const matchedRefDisplay = document.getElementById("matchedRefDisplay");
      const maxTeamDisplay = document.getElementById("maxTeamDisplay");

      // 1️⃣ Hydrate session
      const { data: { session } } = await client.auth.getSession();
      if (!session) {
        msg.textContent = "Unable to load your session. Please sign in.";
        return;
      }

      const email = session.user.email;

      // ⭐ DISPLAY EMAIL
      emailDisplay.textContent = "Email: " + email;

      // 2️⃣ Hide long URL
      history.replaceState(null, "", "registerconfirm.html");

      // 3️⃣ Load NEW USER row
      const { data: userRow } = await client
        .from("UsersSQL")
        .select("*")
        .eq("email", email)
        .single();

      if (!userRow) {
        msg.textContent = "User record not found.";
        return;
      }

      const referrerCode = userRow.referred_by;

      // ⭐ DISPLAY referred_by
      refDisplay.textContent = "Referred By: " + referrerCode;

      // 4️⃣ TEAMMEMBER LOGIC
      const { data: siblings } = await client
        .from("UsersSQL")
        .select("teammembers")
        .eq("referred_by", referrerCode);

      // ⭐ DISPLAY matched referred_by
      matchedRefDisplay.textContent =
        "Matched Referred By in UsersSQL: " + referrerCode;

      // ⭐ GET ONLY REAL NUMBERS (ignore null, ignore empty)
      const nums = (siblings || [])
        .map(r => r.teammembers)
        .filter(v => v !== null && v !== "" && !Number.isNaN(Number(v)))
        .map(v => Number(v));

      // ⭐ TRUE HIGHEST teammembers VALUE FROM DB
      let maxTeam = nums.length > 0 ? Math.max(...nums) : null;

      // ⭐ DISPLAY EXACT VALUE FROM DB
      maxTeamDisplay.textContent =
        "Matched Referred By teammembers (highest from DB): " + maxTeam;

      msg.textContent = "Your email has been verified successfully!";
    }

    finalizeAccount();
  </script>
</body>
</html>
