<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Create Account - SpinWinToken</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

  <!-- reCAPTCHA -->
  <script src="https://www.google.com/recaptcha/api.js?render=6Le0ew8tAAAAAMLEY9q16CLm6CsO8OqvBr88csI4"></script>
  <script>
    async function refreshRecaptchaToken() {
      const token = await grecaptcha.execute(
        "6Le0ew8tAAAAAMLEY9q16CLm6CsO8OqvBr88csI4",
        { action: "signup" }
      );
      document.getElementById("recaptchaToken").value = token;
    }
    grecaptcha.ready(refreshRecaptchaToken);
    setInterval(refreshRecaptchaToken, 120000);
  </script>

  <style>
    body { font-family: Arial; background:#000; color:#ffd700; padding:40px; margin:0; }
    .container { max-width:420px; margin:auto; background:#111; padding:30px; border-radius:12px; border:1px solid #ffd700; }
    h1 { text-align:center; margin-bottom:25px; color:#ffd700; }
    label { display:block; margin-top:12px; font-weight:bold; }
    input { width:100%; padding:10px; margin-top:6px; background:#222; border:1px solid #ffd700; border-radius:6px; color:#ffd700; }
    button { margin-top:20px; padding:12px; width:100%; background:#ffd700; color:#000; font-weight:bold; border:none; border-radius:6px; cursor:pointer; }

    .message { margin-top:20px; font-size:1.6rem; font-weight:bold; text-align:center; }
    .error { color:#ff4d4d; }
    .success { color:#00ff88; }

    .link { margin-top:18px; text-align:center; }
    .link a { color:#00aaff; text-decoration:none; font-weight:bold; }
  </style>
</head>

<body>
  <div class="container">
    <h1>Create Account</h1>

    <form id="createAccountForm">
      <input type="hidden" id="recaptchaToken">

      <label>Email</label>
      <input type="email" id="email" required />

      <label>Password</label>
      <input type="password" id="password" required minlength="6" />

      <label>Confirm Password</label>
      <input type="password" id="confirmPassword" required minlength="6" />

      <div id="refInfo" class="message" style="font-size:1rem; font-weight:normal;"></div>

      <button type="submit">Create Account</button>
    </form>

    <div class="link">
      Already have an account? <a href="signin.html">Sign In</a>
    </div>

    <div id="status" class="message"></div>
  </div>

  <script>
    const client = supabase.createClient(
      "https://nloupcyqrgnrcsxcmzqf.supabase.co",
      "sb_publishable_rdOrMQwrlAW0f0p09RutMw_d6tOiYvT"
    );

    const form = document.getElementById("createAccountForm");
    const statusEl = document.getElementById("status");

    const urlParams = new URLSearchParams(window.location.search);
    const ref = urlParams.get("ref") || "SPINROOT";
    document.getElementById("refInfo").textContent = "Referral: " + ref;

    function generateReferralCode() {
      return "SW" + Date.now().toString(36).toUpperCase();
    }

    async function completeSignup(token) {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const confirmPassword = document.getElementById("confirmPassword").value;

      statusEl.textContent = "";
      statusEl.className = "message";

      if (!token) {
        statusEl.textContent = "reCAPTCHA failed. Please refresh the page.";
        statusEl.classList.add("error");
        return;
      }

      if (password !== confirmPassword) {
        statusEl.textContent = "Passwords do not match.";
        statusEl.classList.add("error");
        return;
      }

      // 1️⃣ CHECK IF EMAIL EXISTS
      const { data: existing } = await client
        .from("UsersSQL")
        .select("indicator")
        .eq("email", email)
        .maybeSingle();

      if (existing) {
        const ind = existing.indicator;

        if (ind == 2) {
          statusEl.textContent = "User already exists.";
          statusEl.classList.add("error");
          return;
        }

        if (ind == 1) {
          statusEl.textContent = "Account already created. Please confirm your email.";
          statusEl.classList.add("error");
          return;
        }
      }

      // 2️⃣ CREATE ACCOUNT
      const { data, error } = await client.auth.signUp({
        email,
        password,
        options: {
          emailRedirectTo: "https://spinwin-referral-system.vercel.app/registerconfirm.html",
          captchaToken: token
        }
      });

      if (error) {
        statusEl.textContent = "Signup error: " + error.message;
        statusEl.classList.add("error");
        return;
      }

      const uid = data.user.id;
      const referralCode = generateReferralCode();

      // 3️⃣ INSERT INTO UsersSQL (FORCE RETURNING)
      const { data: insertData, error: insertError } = await client
        .from("UsersSQL")
        .insert({
          uid,
          email,
          indicator: 1,
          referralcode: referralCode,
          referred_by: ref,
          teammembers: 0,
          totp_secret: null,
          totp_enabled: false,
          teamtoken: 0,
          teamtokenpurchased: 0,
          teamtokenavailable: 0,
          maxtoken: 10
        })
        .select();

      if (insertError) {
        statusEl.textContent = "Database insert error: " + insertError.message;
        statusEl.classList.add("error");
        return;
      }

      statusEl.textContent = "Account created. Please check your email to confirm.";
      statusEl.classList.add("success");
      form.reset();
    }

    form.addEventListener("submit", (e) => {
      e.preventDefault();
      completeSignup(document.getElementById("recaptchaToken").value);
    });
  </script>
</body>
</html>
