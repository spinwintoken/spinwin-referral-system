<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Sign In - SpinWinToken</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

  <style>
    body { background:#000; color:#ffd700; font-family:Arial; padding:40px; margin:0; }
    .container { max-width:420px; margin:auto; background:#111; padding:30px; border-radius:12px; border:1px solid #ffd700; }
    h1 { text-align:center; margin-bottom:25px; color:#ffd700; }
    label { display:block; margin-top:12px; font-weight:bold; }
    input { width:100%; padding:10px; margin-top:6px; background:#222; border:1px solid #ffd700; border-radius:6px; color:#ffd700; }
    button { margin-top:20px; padding:12px; width:100%; background:#ffd700; color:#000; font-weight:bold; border:none; border-radius:6px; cursor:pointer; }
    .message { margin-top:20px; font-size:1.6rem; font-weight:bold; text-align:center; }
    .error { color:#ff4d4d; }
    .success { color:#00ff88; }
  </style>
</head>

<body>
  <div class="container">
    <h1>Sign In</h1>

    <form id="signinForm">
      <label>Email</label>
      <input type="email" id="email" required />

      <label>Password</label>
      <input type="password" id="password" required minlength="6" />

      <button type="submit">Sign In</button>
    </form>

    <div id="status" class="message"></div>
  </div>

  <script>
    const client = supabase.createClient(
      "https://nloupcyqrgnrcsxcmzqf.supabase.co",
      "sb_publishable_rdOrMQwrlAW0f0p09RutMw_d6tOiYvT"
    );

    const SENDGRID_KEY = "SG_YOUR_REAL_SENDGRID_KEY_HERE";

    const form = document.getElementById("signinForm");
    const statusEl = document.getElementById("status");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      statusEl.textContent = "";
      statusEl.className = "message";

      // 1️⃣ Sign in with Supabase
      const { data, error } = await client.auth.signInWithPassword({
        email,
        password
      });

      if (error) {
        statusEl.textContent = "Invalid email or password.";
        statusEl.classList.add("error");
        return;
      }

      const uid = data.user.id;

      // 2️⃣ Load user row
      const { data: userRow } = await client
        .from("UsersSQL")
        .select("*")
        .eq("uid", uid)
        .single();

      if (!userRow) {
        statusEl.textContent = "User record not found.";
        statusEl.classList.add("error");
        return;
      }

      const referrerCode = userRow.referred_by;

      // 3️⃣ Referral logic
      const { data: refRows } = await client
        .from("UsersSQL")
        .select("teammembers")
        .eq("referred_by", referrerCode)
        .order("teammembers", { ascending: true });

      const teamValues = refRows.map(r => Number(r.teammembers)).filter(v => !Number.isNaN(v));
      const maxTeam = teamValues.length > 0 ? Math.max(...teamValues) : 0;
      const newTeamCount = maxTeam + 1;

      await client
        .from("UsersSQL")
        .update({
          teammembers: newTeamCount,
          indicator: 2
        })
        .eq("uid", uid);

      // 4️⃣ Generate 6-digit code
      const code = Math.floor(100000 + Math.random() * 900000).toString();

      // 5️⃣ Store code
      await client
        .from("UsersSQL")
        .update({
          email_code: code,
          email_code_expires: new Date(Date.now() + 10 * 60 * 1000)
        })
        .eq("uid", uid);

      // 6️⃣ SendGrid email (browser-safe using no-cors)
      fetch("https://api.sendgrid.com/v3/mail/send", {
        method: "POST",
        mode: "no-cors",
        headers: {
          "Authorization": `Bearer ${SENDGRID_KEY}`,
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          personalizations: [
            {
              to: [{ email }],
              subject: "Your SpinWinToken Verification Code"
            }
          ],
          from: { email: "no-reply@spinwintoken.com" },
          content: [
            {
              type: "text/plain",
              value: `Your verification code is ${code}. It expires in 10 minutes.`
            }
          ]
        })
      });

      // 7️⃣ Store email
      localStorage.setItem("pending_email", email);

      statusEl.textContent = "Code sent. Check your email.";
      statusEl.classList.add("success");

      // 8️⃣ Redirect
      setTimeout(() => {
        window.location.href = "verifycode.html";
      }, 1200);
    });
  </script>
</body>
</html>
