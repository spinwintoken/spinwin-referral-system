<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Create Account</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  font-family: Arial, sans-serif;
  padding: 20px;
}
input {
  display: block;
  margin-bottom: 10px;
  padding: 8px;
  width: 280px;
}
button {
  padding: 10px 20px;
}
#msg {
  margin-top: 15px;
  color: red;
}
</style>
</head>

<body>
<h2>Create Account</h2>

<input id="email" type="email" placeholder="Email" />
<input id="password" type="password" placeholder="Password" />
<input id="referralcode" type="text" placeholder="Referral Code (optional)" />

<button id="createBtn">Create Account</button>

<div id="msg"></div>

<script>
const supabase = supabase.createClient(
  "https://YOUR_PROJECT_URL.supabase.co",
  "YOUR_ANON_KEY"
);

document.getElementById("createBtn").addEventListener("click", async () => {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();
  const referralcode = document.getElementById("referralcode").value.trim();
  const msg = document.getElementById("msg");

  msg.textContent = "";

  if (!email || !password) {
    msg.textContent = "Email and password required.";
    return;
  }

  // 1. Check if email already exists
  const { data: existingUser, error: checkError } = await supabase
    .from("UsersSQL")
    .select("email")
    .eq("email", email)
    .maybeSingle();

  if (checkError) {
    msg.textContent = "Error checking email.";
    return;
  }

  if (existingUser) {
    msg.textContent = "This email already exists.";
    return;
  }

  // 2. Create Supabase Auth user
  const { data: signupData, error: signupError } = await supabase.auth.signUp({
    email,
    password
  });

  if (signupError) {
    msg.textContent = "Signup failed: " + signupError.message;
    return;
  }

  const uid = signupData.user.id;

  // 3. Insert into UsersSQL
  const { error: insertError } = await supabase.from("UsersSQL").insert({
    uid,
    email,
    referralcode: referralcode || null,
    referred_by: referralcode || null,
    teammembers: 0,
    teamtoken: 0,
    teamtokenpurchased: 0,
    teamtokenavailable: 0,
    maxtoken: 0
  });

  if (insertError) {
    msg.textContent = "Database insert failed.";
    return;
  }

  // 4. Redirect to confirmation page
  window.location.href = "registerconfirm.html";
});
</script>

</body>
</html>
