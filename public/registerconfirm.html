<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Account Confirmed</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      background: #000;
      color: #ffd700;
      font-family: Arial, sans-serif;
      text-align: center;
      padding-top: 60px;
      margin: 0;
    }
    .box {
      background: #111;
      padding: 40px;
      border-radius: 12px;
      width: 90%;
      max-width: 480px;
      margin: auto;
      border: 1px solid #ffd700;
    }
    p {
      font-size: 18px;
      color: #fff;
      margin: 10px 0;
    }
    .btn {
      margin-top: 25px;
      padding: 12px 20px;
      background: #ffd700;
      color: #000;
      font-weight: bold;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 18px;
      text-decoration: none;
      display: inline-block;
    }
    .btn:hover {
      background: #e6c200;
    }
  </style>
</head>

<body>
  <div class="box">
    <h1>Account Confirmed</h1>
    <p>Your email has been verified successfully.</p>
    <p>You may now sign in.</p>

    <a href="signin.html" class="btn">Sign In</a>
  </div>
</body>
</html>
