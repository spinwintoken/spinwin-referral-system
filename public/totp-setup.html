<script>
const client = supabase.createClient(
  "https://fchwxnontbfybypezpge.supabase.co",
  "YOUR_ANON_KEY"
);

let factorId = null;

async function init() {
  const { data: { session } } = await client.auth.getSession();
  if (!session) {
    document.getElementById("msg").textContent = "Please sign in first.";
    return;
  }

  // 1. Enroll TOTP factor
  const { data: factor, error } = await client.auth.mfa.enroll({
    factorType: "totp"
  });

  if (error) {
    document.getElementById("msg").textContent = "Error enrolling factor.";
    return;
  }

  factorId = factor.id;

  // 2. Display QR code
  document.getElementById("qr").src = factor.totp.qr_code;
}

async function verify() {
  const code = document.getElementById("code").value.trim();
  const msg = document.getElementById("msg");

  const { data, error } = await client.auth.mfa.verify({
    factorId,
    code
  });

  if (error) {
    msg.textContent = "Invalid code.";
    return;
  }

  msg.textContent = "2FA Enabled!";
  setTimeout(() => window.location.href = "signin.html", 1500);
}

init();
</script>
