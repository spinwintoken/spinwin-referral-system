<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Setup 2FA</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body { background:#000; color:#ff7000; font-family:Arial; text-align:center; padding:40px; }
  input { padding:10px; font-size:18px; width:200px; text-align:center; }
  button { padding:10px 20px; font-size:18px; background:#ff7000; border:none; cursor:pointer; }
  img { margin-top:20px; width:300px; height:300px; background:#111; }
</style>
</head>
<body>

<h1>Two-Factor Authentication Setup</h1>
<p>Scan the QR code with Google Authenticator.</p>
<img id="qr" />
<p>Enter the 6-digit code:</p>
<input id="code" maxlength="6">
<br><br>
<button onclick="verify()">Verify & Enable 2FA</button>
<p id="msg"></p>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<script>
const client = supabase.createClient(
  "https://fchwxnontbfybypezpge.supabase.co",
  "YOUR_ANON_KEY_HERE"
);

let factorId = null;

async function loadQR() {
  const { data: { session } } = await client.auth.getSession();
  if (!session) {
    document.getElementById("msg").innerText = "You are not signed in.";
    return;
  }

  // ⭐ REMOVE ALL EXISTING TOTP FACTORS (new Supabase API format)
  const { data: factors } = await client.auth.mfa.listFactors();
  for (const f of factors.all) {
    if (f.factor_type === "totp") {
      await client.auth.mfa.unenroll({ factorId: f.id });
      console.log("Removed old TOTP factor:", f.id);
    }
  }

  // ⭐ ENROLL NEW TOTP FACTOR
  const { data, error } = await client.auth.mfa.enroll({
    factorType: "totp"
  });

  if (error) {
    document.getElementById("msg").innerText = error.message;
    return;
  }

  factorId = data.id;

  // ⭐ DISPLAY QR CODE (new API field)
  const qrImg = document.getElementById("qr");
  qrImg.src = data.qr_code;
  qrImg.alt = "QR Code Loaded";
}

async function verify() {
  const code = document.getElementById("code").value.trim();

  const { data, error } = await client.auth.mfa.verify({
    factorId,
    code
  });

  if (error) {
    document.getElementById("msg").innerText = error.message;
    return;
  }

  document.getElementById("msg").innerText = "2FA Enabled!";
}

// ⭐ CALL THE FUNCTION
loadQR();
</script>

</body>
</html>
