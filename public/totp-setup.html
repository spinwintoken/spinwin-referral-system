<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Enable 2FA</title>
</head>
<body>
  <h1>Enable Two‑Factor Authentication (TOTP)</h1>

  <div id="status"></div>

  <button id="generate">Generate QR Code</button>

  <div id="qr-container" style="margin-top:20px; display:none;">
    <p>Scan this QR code with Google Authenticator, Authy, etc.</p>
    <canvas id="qr"></canvas>
    <p>Or enter this secret manually:</p>
    <code id="secret"></code>
  </div>

  <div id="verify-container" style="margin-top:20px; display:none;">
    <p>Enter the 6‑digit code from your app:</p>
    <input id="code" maxlength="6" />
    <button id="verify">Verify & Enable 2FA</button>
  </div>

  <script src="https://unpkg.com/@supabase/supabase-js@2.45.0/dist/umd/supabase.js"></script>
  <script src="https://unpkg.com/otpauth@9.5.1/dist/otpauth.umd.min.js"></script>
  <script src="https://unpkg.com/qrcode@1.5.3/build/qrcode.min.js"></script>
  <script src="totp-setup.js"></script>
</body>
</html>
