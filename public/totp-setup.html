<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Setup 2FA</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body { background:#000; color:#ffd700; font-family:Arial; text-align:center; padding:40px; }
  input { padding:10px; font-size:18px; width:200px; text-align:center; }
  button { padding:10px 20px; font-size:18px; background:#ffd700; border:none; cursor:pointer; }
  img { margin-top:20px; width:300px; height:300px; background:#111; }
</style>
</head>

<body>
<h1>Two-Factor Authentication Setup</h1>
<p>Scan the QR code with Google Authenticator.</p>

<img id="qr" />

<p>Enter the 6-digit code:</p>
<input id="code" maxlength="6">
<br><br>
<button onclick="verify()">Verify & Enable 2FA</button>

<p id="msg"></p>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<script>
console.log("Supabase JS loaded:", typeof supabase);

const client = supabase.createClient(
  "https://fchwxnontbfybypezpge.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZjaHd4bm9udGJmeWJ5cGV6cGdlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1NDAxNTAsImV4cCI6MjA5NjExNjE1MH0.PTs0fUP0aX21t6RtXyVD__yohn1lFynhgplXhbfZeEI"
);

let factorId = null;

async function loadQR() {
  console.log("Running loadQR()...");

  const { data: { session }, error: sessionError } = await client.auth.getSession();
  console.log("Session:", session, "Error:", sessionError);

  if (!session) {
    document.getElementById("msg").innerText = "You are not signed in.";
    return;
  }

  const { data, error } = await client.auth.mfa.enroll({
    factorType: "totp"
  });

  console.log("Enroll result:", data, error);

  if (error) {
    document.getElementById("msg").innerText = error.message;
    return;
  }

  factorId = data.id;

  // DEBUG: show QR code string
  console.log("QR CODE STRING:", data.totp.qrCode);

  // FORCE the QR code to load
  const qrImg = document.getElementById("qr");
  qrImg.src = data.totp.qrCode;
  qrImg.alt = "QR Code Loaded";

  console.log("QR Code src set:", qrImg.src.substring(0, 50));
}

async function verify() {
  const code = document.getElementById("code").value.trim();

  const { data, error } = await client.auth.mfa.verify({
    factorId,
    code
  });

  console.log("Verify result:", data, error);

  if (error) {
    document.getElementById("msg").innerText = error.message;
    return;
  }

  document.getElementById("msg").innerText = "2FA Enabled!";
}

loadQR();
</script>

</body>
</html>
