<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Sign In</title>
</head>
<body>
  <h1>Sign In</h1>
  <div id="status"></div>
  <form id="form">
    <label>Email: <input type="email" id="email" required></label><br>
    <label>Password: <input type="password" id="password" required></label><br>
    <button type="submit">Sign In</button>
  </form>

  <div id="totp-container" style="display:none;">
    <p>Enter your 2FA code:</p>
    <input id="totp" maxlength="6">
    <button id="totp-submit">Verify 2FA</button>
  </div>

  <script src="https://unpkg.com/@supabase/supabase-js@2.45.0/dist/umd/supabase.js"></script>
  <script src="signin.js"></script>
</body>
</html>
